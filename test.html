<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Frontify Finder — CHIPS embedded asset chooser test</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                font-family: system-ui, sans-serif;
            }
            #app {
                display: grid;
                grid-template-rows: auto 1fr 220px;
                height: 100vh;
            }
            header {
                padding: 12px 16px;
                background: #111;
                color: #fff;
            }
            #finder {
                min-height: 0;
            }
            #log {
                overflow: auto;
                padding: 12px 16px;
                background: #f6f6f6;
                border-top: 1px solid #ddd;
                font: 12px/1.5 ui-monospace, monospace;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <header>
                <strong>Frontify Finder (CHIPS mock)</strong> — top-level host:
                <code id="host"></code> · iframe: <code>https://dev.frontify.test/embedded-asset-chooser</code>
            </header>
            <div id="finder"></div>
            <div id="log"></div>
        </div>

        <!-- Served cross-site (customer.test) so the iframe (frontify.test) is a genuine third party. -->
        <script type="module">
            import { create } from './dist/index.es.js';

            const logEl = document.getElementById('log');
            document.getElementById('host').textContent = location.origin;

            const log = (...args) => {
                // eslint-disable-next-line no-console
                console.log('[host]', ...args);
                logEl.textContent +=
                    args.map((a) => (typeof a === 'string' ? a : JSON.stringify(a, null, 2))).join(' ') + '\n';
            };

            log('Mounting finder iframe → https://dev.frontify.test/embedded-asset-chooser');

            try {
                const finder = await create({
                    clientId: 'dev',
                    domain: 'dev.frontify.test',
                    options: { allowMultiSelect: true },
                });

                finder.onAssetsChosen((assets) => log('✅ assetsChosen:', assets));
                finder.onCancel(() => log('cancelled'));
                finder.mount(document.getElementById('finder'));

                log('Finder mounted. Waiting for handshake + session exchange…');
            } catch (error) {
                log('❌ failed to create finder:', String(error));
            }
        </script>
    </body>
</html>
